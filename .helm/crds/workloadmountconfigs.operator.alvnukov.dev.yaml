apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workloadmountconfigs.operator.alvnukov.dev
spec:
  group: operator.alvnukov.dev
  scope: Namespaced
  names:
    plural: workloadmountconfigs
    singular: workloadmountconfig
    kind: WorkloadMountConfig
    shortNames:
      - wmcfg
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - deployments
              properties:
                deployments:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - namespace
                      - name
                      - containers
                    properties:
                      namespace:
                        type: string
                      name:
                        type: string
                      containers:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          required:
                            - name
                            - sources
                          properties:
                            name:
                              type: string
                            sources:
                              type: array
                              minItems: 1
                              items:
                                type: object
                                required:
                                  - type
                                  - name
                                  - items
                                properties:
                                  type:
                                    type: string
                                    enum: ["ConfigMap", "Secret"]
                                  name:
                                    type: string
                                  items:
                                    type: array
                                    minItems: 1
                                    items:
                                      type: object
                                      required:
                                        - key
                                        - value
                                        - mountPath
                                      properties:
                                        key:
                                          type: string
                                        value:
                                          type: string
                                        mountPath:
                                          type: string
                                        subPath:
                                          type: string
                                        path:
                                          type: string
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
